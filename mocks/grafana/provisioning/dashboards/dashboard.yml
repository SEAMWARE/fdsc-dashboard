# Grafana dashboard provisioning configuration.
#
# Tells Grafana to auto-load any JSON dashboard files found under the
# configured path. The sample-dashboard.json in this directory is picked
# up automatically on startup.
apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
