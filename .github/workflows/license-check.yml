name: License Header Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  license-check:
    name: Verify license headers
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm ci fails on cross-platform optional deps (e.g. @esbuild/netbsd-arm64)
        # recorded in the lockfile — same issue as the Dockerfile (npm/cli#4828).
        run: npm install

      - name: Verify license headers
        run: npm run license:check
